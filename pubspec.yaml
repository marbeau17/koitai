name: koitai
description: "KoiTai - Love Timing Fortune App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Calendar
  table_calendar: ^3.1.3

  # Charts
  fl_chart: ^0.69.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_messaging: ^15.1.7
  firebase_analytics: ^11.3.7
  firebase_crashlytics: ^4.2.1

  # Monetization
  purchases_flutter: ^8.3.0

  # Authentication
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Notifications
  flutter_local_notifications: ^18.0.1
  flutter_timezone: ^4.1.1
  timezone: ^0.10.1

  # Sharing
  share_plus: ^10.1.4

  # Fonts
  google_fonts: ^6.2.1

  # Crypto (used for Apple Sign-In nonce)
  crypto: ^3.0.6

  # Utilities
  intl: ^0.20.2
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/splash/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#6C3FE0"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter_native_splash:
  color: "#0F0A1A"
  image: "assets/splash/splash_logo.png"
  android: true
  ios: true
  web: true
